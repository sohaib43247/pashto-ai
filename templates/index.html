<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">

    <title>Pashto AI Translator</title>

</head>

<body>

    <center>

        <h1>Pashto AI Translator</h1>

        <form method="POST">

            <textarea
                name="text"
                rows="10"
                cols="60"
                placeholder="Write English, Urdu or Roman Urdu"
            ></textarea>

            <br><br>

            <input type="submit" value="Translate">

        </form>

        <br><br>

        <h2>{{ translated_text }}</h2>

    </center>

</body>

</html>
