<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pashto AI Translator</title>

    <style>

        body{
            background:#0f172a;
            color:white;
            font-family:Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{
            width:700px;
            text-align:center;
        }

        h1{
            color:#38bdf8;
        }

        textarea{
            width:100%;
            height:220px;
            border:none;
            border-radius:12px;
            padding:15px;
            font-size:18px;
        }

        button{
            margin-top:20px;
            padding:14px 35px;
            border:none;
            border-radius:10px;
            background:#38bdf8;
            color:white;
            font-size:18px;
            cursor:pointer;
        }

        .result{
            margin-top:30px;
            background:white;
            color:black;
            padding:20px;
            border-radius:12px;
            min-height:80px;
            font-size:22px;
        }

    </style>

</head>

<body>

    <div class="box">

        <h1>Pashto AI Translator</h1>

        <p>
            اردو، English، یا Roman Urdu لکھیں
        </p>

        <form method="POST">

            <textarea
                name="text"
                placeholder="Write here..."
            ></textarea>

            <br>

            <button type="submit">
                Translate
            </button>

        </form>

        <div class="result">

            {{ translated_text }}

        </div>

    </div>

</body>

</html>
