<!DOCTYPE html>
<html>

<head>
    <title>Pashto AI</title>

    <style>

        body{
            background:#0f172a;
            font-family:Arial;
            color:white;
            padding:40px;
        }

        .container{
            max-width:700px;
            margin:auto;
            background:#1e293b;
            padding:25px;
            border-radius:20px;
        }

        h1{
            text-align:center;
            color:#38bdf8;
        }

        h3{
            margin-top:20px;
        }

        textarea{
            width:100%;
            height:150px;
            border:2px solid #38bdf8;
            border-radius:12px;
            padding:15px;
            font-size:18px;
            margin-top:10px;
        }

        button{
            margin-top:20px;
            width:100%;
            background:#06b6d4;
            color:white;
            border:none;
            padding:15px;
            font-size:20px;
            border-radius:12px;
            cursor:pointer;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Pashto AI Translator</h1>

    <form method="POST">

        <h3>English / Urdu Input</h3>

        <textarea
            name="text"
            placeholder="Write here..."
        ></textarea>

        <button type="submit">
            Translate To Pashto
        </button>

    </form>

    <h3>Pashto Output</h3>

    <textarea readonly>{{ translated_text }}</textarea>

</div>

</body>

</html>
