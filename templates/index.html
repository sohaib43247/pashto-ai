<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pashto AI Translator</title>

    <style>

        body{
            background:#0f172a;
            font-family:Arial;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            width:700px;
            background:#1e293b;
            padding:30px;
            border-radius:20px;
        }

        h1{
            text-align:center;
            color:#38bdf8;
        }

        label{
            font-size:18px;
        }

        textarea{
            width:100%;
            height:140px;
            border:2px solid #38bdf8;
            border-radius:12px;
            padding:15px;
            font-size:18px;
            margin-top:10px;
            margin-bottom:20px;
        }

        button{
            background:#06b6d4;
            color:white;
            border:none;
            padding:12px 30px;
            border-radius:10px;
            font-size:18px;
            cursor:pointer;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Pashto AI Translator</h1>

    <form method="POST">

        <label>English / Urdu Input</label>

        <textarea
            name="text"
            placeholder="Write here..."
        ></textarea>

        <button type="submit">
            Translate
        </button>

    </form>

    <br><br>

    <label>Translated Output</label>

    <textarea readonly>{{ translated_text }}</textarea>

</div>

</body>

</html>
