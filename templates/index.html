<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pashto AI Translator</title>

    <style>
        body{
            background:#0f172a;
            font-family:Arial;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            width:700px;
            text-align:center;
        }

        h1{
            color:#38bdf8;
            margin-bottom:20px;
        }

        .lang-box{
            display:flex;
            justify-content:space-between;
            margin-bottom:10px;
        }

        select{
            padding:10px;
            border-radius:8px;
            border:none;
            font-size:16px;
        }

        textarea{
            width:100%;
            height:150px;
            border-radius:12px;
            border:2px solid #38bdf8;
            padding:15px;
            font-size:18px;
            margin-bottom:15px;
            resize:none;
        }

        .swap-btn{
            background:#38bdf8;
            color:white;
            border:none;
            padding:10px 20px;
            border-radius:10px;
            cursor:pointer;
            font-size:20px;
            margin-bottom:15px;
        }

        .translate-btn{
            background:#06b6d4;
            color:white;
            border:none;
            padding:12px 30px;
            border-radius:10px;
            font-size:18px;
            cursor:pointer;
            margin-top:10px;
        }

        .translate-btn:hover{
            background:#0891b2;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Pashto AI Translator</h1>

    <div class="lang-box">
        <select id="fromLang">
            <option>English</option>
            <option>Urdu</option>
            <option>Roman Urdu</option>
            <option>Pashto</option>
        </select>

        <select id="toLang">
            <option>Pashto</option>
            <option>English</option>
            <option>Urdu</option>
        </select>
    </div>

    <textarea id="inputText" placeholder="Write text here..."></textarea>

    <button class="swap-btn" onclick="swapLanguages()">⇅ Swap</button>

    <textarea id="outputText" placeholder="Translated text..." readonly></textarea>

    <br>

    <button class="translate-btn" onclick="translateText()">
        Translate
    </button>

</div>

<script>

function swapLanguages(){

    let from = document.getElementById("fromLang");
    let to = document.getElementById("toLang");

    let temp = from.value;
    from.value = to.value;
    to.value = temp;

    let input = document.getElementById("inputText").value;
    let output = document.getElementById("outputText").value;

    document.getElementById("inputText").value = output;
    document.getElementById("outputText").value = input;
}

function translateText(){

    let text = document.getElementById("inputText").value;

    if(text.trim() == ""){
        alert("Please write something");
        return;
    }

    document.getElementById("outputText").value =
        "Translated: " + text;
}

</script>

</body>
</html>
