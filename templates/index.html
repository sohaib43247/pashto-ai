<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pashto AI</title>

    <style>

        body{
            background:#0f172a;
            color:white;
            font-family:Arial;
            padding:40px;
        }

        .container{
            max-width:700px;
            margin:auto;
        }

        textarea{
            width:100%;
            height:160px;
            margin-top:10px;
            margin-bottom:20px;
            border:none;
            border-radius:10px;
            padding:15px;
            font-size:18px;
        }

        button{
            width:100%;
            padding:15px;
            border:none;
            border-radius:10px;
            background:#2563eb;
            color:white;
            font-size:20px;
            cursor:pointer;
        }

        h1{
            text-align:center;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Pashto AI Translator</h1>

    <form method="POST">

        <h3>Input Language</h3>

        <textarea
            name="text"
            placeholder="Write English, Urdu or Roman Urdu"
        ></textarea>

        <button type="submit">
            Translate To Pashto
        </button>

    </form>

    <h3>Pashto Translation</h3>

    <textarea readonly>{{ translated_text }}</textarea>

</div>

</body>

</html>
