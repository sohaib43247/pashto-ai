<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pashto AI</title>

    <style>

        body{
            background:#0f172a;
            color:white;
            font-family:Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .container{
            width:90%;
            max-width:700px;
            text-align:center;
        }

        h1{
            color:#38bdf8;
            margin-bottom:20px;
        }

        textarea{
            width:100%;
            height:180px;
            padding:15px;
            border-radius:10px;
            border:none;
            font-size:18px;
            resize:none;
        }

        button{
            margin-top:20px;
            padding:12px 30px;
            font-size:18px;
            border:none;
            border-radius:10px;
            background:#38bdf8;
            color:white;
            cursor:pointer;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Pashto AI Translator</h1>

        <textarea placeholder="Write Urdu, Roman Urdu or Pashto..."></textarea>

        <br>

        <button>Translate</button>

    </div>

</body>
</html>
